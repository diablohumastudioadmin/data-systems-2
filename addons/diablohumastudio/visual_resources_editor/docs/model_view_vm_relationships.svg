    <text class="box-title" x="14" y="26">A17-20, 24-25</text>
    <text class="box-subtitle" x="14" y="48">Resource Script Changes</text>
    <text class="item" x="14" y="74">- create / remove / rename classes</text>
    <text class="item" x="14" y="96">- move script path</text>
    <text class="item" x="14" y="118">- change inherited parent</text>
    <text class="item" x="14" y="140">- change exported properties</text>
  </g>

