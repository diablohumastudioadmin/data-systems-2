<svg xmlns="http://www.w3.org/2000/svg" width="2800" height="1780" viewBox="0 0 2800 1780" role="img" aria-labelledby="title desc">
  <title id="title">Visual Resources Editor model, viewmodel, and view relationship map</title>
  <desc id="desc">Automatic sources on the left feed models. Models and viewmodels provide data to views. User actions inside views point back to viewmodels or commands. Command viewmodels can mutate models.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .box-subtitle { font: 700 13px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .item { font: 13px 'Helvetica Neue', Arial, sans-serif; fill: #1e293b; }
      .item-small { font: 12px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .mono { font-family: Menlo, Consolas, monospace; }

      .auto-box { fill: #fff1f2; stroke: #ef4444; stroke-width: 2; rx: 14; }
      .model-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .vm-box { fill: #fffbeb; stroke: #d97706; stroke-width: 2; rx: 12; }
      .view-box { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 14; }
      .legend-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
      .divider { stroke: #94a3b8; stroke-width: 1.5; }

      .arrow-auto { stroke: #ef4444; stroke-width: 2.5; fill: none; marker-end: url(#arrow-auto); }
      .arrow-model { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow-model); }
      .arrow-vm { stroke: #d97706; stroke-width: 2.5; fill: none; marker-end: url(#arrow-vm); }
      .arrow-action { stroke: #059669; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow-action); }
      .arrow-command { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrow-command); }
      .arrow-dependency { stroke: #1d4ed8; stroke-width: 2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-model); }
    </style>

    <marker id="arrow-auto" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-model" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-vm" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-action" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-command" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2800" height="1780"/>
  <text class="title" x="28" y="42">Model / ViewModel / View Relationship Map</text>

  <g transform="translate(20,70)">
    <rect class="legend-box" x="0" y="0" width="270" height="178"/>
    <text class="box-title" x="16" y="28">Legend</text>
    <line class="arrow-auto" x1="20" y1="52" x2="84" y2="52"/>
    <text class="item" x="98" y="57">Automatic source -&gt; Model</text>
    <line class="arrow-model" x1="20" y1="82" x2="84" y2="82"/>
    <text class="item" x="98" y="87">Model -&gt; View</text>
    <line class="arrow-vm" x1="20" y1="112" x2="84" y2="112"/>
    <text class="item" x="98" y="117">ViewModel -&gt; View</text>
    <line class="arrow-action" x1="20" y1="142" x2="84" y2="142"/>
    <text class="item" x="98" y="147">View user action -&gt; ViewModel</text>
    <line class="arrow-command" x1="20" y1="168" x2="84" y2="168"/>
    <text class="item" x="98" y="173">Command ViewModel -&gt; Model</text>
  </g>

  <text class="section" x="20" y="305">Automatic Sources</text>
  <text class="section" x="280" y="305">Models</text>
  <text class="section" x="700" y="24">ViewModels</text>
  <text class="section" x="1890" y="305">Views</text>

